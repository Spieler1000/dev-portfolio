<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spieler1000 | Developer Portfolio</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0d1117;
      --card:#161b22;
      --green:#2ecc71;
      --orange:#f39c12;
      --text:#e6edf3;
      --muted:#8b949e;
    }

    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
    body{background:var(--bg);color:var(--text);line-height:1.6}

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px;
    }

    .logo{font-size:1.3rem;font-weight:700;color:var(--green)}

    button{
      background:none;
      border:1px solid var(--green);
      color:var(--green);
      padding:6px 14px;
      border-radius:10px;
      cursor:pointer;
      transition:.3s;
    }
    button:hover{background:var(--green);color:#000}

    /* HERO */
    .hero{text-align:center;padding:100px 20px}
    .hero h1{font-size:3rem}
    .hero h2{color:var(--green);margin-top:10px}
    .hero p{max-width:600px;margin:20px auto;color:var(--muted)}

    .btn{
      display:inline-block;
      margin-top:25px;
      padding:14px 28px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--green),var(--orange));
      color:#000;
      text-decoration:none;
      font-weight:600;
      transition:.3s;
    }
    .btn:hover{
      transform:translateY(-4px);
      box-shadow:0 0 25px rgba(46,204,113,.6);
    }

    /* SECTIONS */
    .section{max-width:1100px;margin:60px auto;padding:0 20px}

    .card{
      background:var(--card);
      border-radius:20px;
      padding:30px;
      margin-bottom:30px;
      transition:.3s;
    }
    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 0 30px rgba(46,204,113,.25);
    }

    h3{margin-bottom:15px}

    /* SKILLS */
    .skills span,.tags span{
      display:inline-block;
      margin:6px;
      padding:8px 14px;
      border-radius:20px;
      border:1px solid var(--green);
      background:var(--bg);
      font-size:.9rem;
    }

    /* PROJECT GRID */
    .project-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .project-card{
      background:var(--bg);
      border-radius:16px;
      padding:20px;
      transition:.3s;
      border:1px solid transparent;
    }
    .project-card:hover{
      transform:translateY(-6px);
      border-color:var(--orange);
      box-shadow:0 0 25px rgba(243,156,18,.35);
    }

    .project-card h4{margin-bottom:10px;color:var(--green)}

    footer{text-align:center;padding:40px;color:var(--muted)}

    /* ANIMATION */
    .fade{
      opacity:0;
      transform:translateY(30px);
      animation:fadeIn 1s forwards;
    }
    @keyframes fadeIn{
      to{opacity:1;transform:translateY(0)}
    }

    @media(max-width:600px){
      .hero h1{font-size:2.2rem}
      header{padding:20px}
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Spieler1000</div>
  <button id="langToggle">EN</button>
</header>

<section class="hero fade">
  <h1>Spieler1000</h1>
  <h2 data-de="Web & Minecraft Developer" data-en="Web & Minecraft Developer"></h2>
  <p data-de="Ich entwickle moderne Webseiten und Minecraft-Server mit Fokus auf Performance, Design und User Experience."
     data-en="I develop modern websites and Minecraft servers with a focus on performance, design and user experience."></p>
  <a href="#projects" class="btn">Projects</a>
</section>

<section class="section fade">
  <div class="card">
    <h3 data-de="Über mich" data-en="About me"></h3>
    <p data-de="Ich bin ein fortgeschrittener Schüler mit Erfahrung in Webentwicklung, Backend-Systemen und Minecraft-Servern."
       data-en="I am an advanced student developer with experience in web development, backend systems and Minecraft servers."></p>
  </div>

  <div class="card">
    <h3 data-de="Skills" data-en="Skills"></h3>
    <div class="skills">
      <span>HTML</span><span>CSS</span><span>JavaScript</span><span>Python</span>
      <span>Java</span><span>UI</span><span>UX</span><span>Minecraft Dev</span>
    </div>
  </div>
</section>

<section class="section fade" id="projects">
  <div class="card">
    <h3 data-de="Projekte" data-en="Projects"></h3>

    <div class="project-grid">
      <div class="project-card">
        <h4>Nerix.net</h4>
        <p data-de="Minecraft PvP Practice Server (Java Edition) mit modernem Kampfsystem."
           data-en="Minecraft PvP practice server (Java Edition) with modern combat mechanics."></p>
        <div class="tags">
          <span>Minecraft</span><span>Java</span><span>Server</span>
        </div>
      </div>

      <div class="project-card">
        <h4>Coming Soon</h4>
        <p data-de="Weitere Projekte folgen."
           data-en="More projects coming soon."></p>
      </div>
    </div>
  </div>
</section>

<section class="section fade">
  <div class="card">
    <h3>Discord</h3>
    <button class="btn" onclick="copyDiscord()">DM: @Spieler1000</button>
  </div>
</section>

<footer>
  © 2026 Spieler1000
</footer>

<script>
  let lang = "de";
  const toggle = document.getElementById("langToggle");
  const elements = document.querySelectorAll("[data-de]");

  function updateLanguage(){
    elements.forEach(el=>{
      el.innerText = el.dataset[lang];
    });
    toggle.innerText = lang === "de" ? "EN" : "DE";
  }

  /* Texte sofort beim Laden setzen ✅ */
  updateLanguage();

  toggle.onclick = () => {
    lang = lang === "de" ? "en" : "de";
    updateLanguage();
  };

  function copyDiscord(){
    navigator.clipboard.writeText("@Spieler1000");
    alert("Discord Username kopiert!");
  }
</script>

</body>
</html>
